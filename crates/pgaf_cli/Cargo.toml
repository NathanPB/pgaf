[package]
name = "pgaf_cli"
version = "0.1.0"
edition = "2024"
authors.workspace = true
license.workspace = true

[dependencies]
pgaf_engine = { path = "../pgaf_engine" }
pgaf_sdk = { path = "../pgaf_sdk" }
pgaf_std = { path = "../pgaf_std" }
clap = { version = "4.5.29", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
validator = { version = "0.20.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.17.1"
thiserror = "2.0.12"
